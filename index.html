<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const theme = (stored === 'light' || stored === 'dark') ? stored : 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Ambient background decorative blobs -->
  <div class="ambient-glow">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ============================================================
       HEADER — Clock, Greeting, Theme Toggle, Name Setting
  ============================================================ -->
  <header class="dashboard-header">
    <div class="header-left">
      <p id="current-date" class="date">Monday, 17 June 2026</p>
      <h1 id="current-time" class="clock">00:00:00</h1>
      <p id="greeting" class="greeting">Good morning, Friend!</p>
    </div>
    <div class="header-right">
      <button id="btn-set-name" class="btn btn-secondary" aria-label="Set your name">
        ✏️ Set Name
      </button>
      <button id="btn-theme-toggle" class="btn btn-secondary" aria-label="Toggle light/dark mode">
        🌙 Dark Mode
      </button>
    </div>
  </header>

  <!-- ============================================================
       MAIN CONTENT — three columns on wide screens
  ============================================================ -->
  <main class="dashboard-main">

    <!-- ----------------------------------------------------------
         COLUMN 1 — Focus Timer
    ---------------------------------------------------------- -->
    <section class="card" id="timer-section" aria-labelledby="timer-heading">
      <h2 id="timer-heading" class="card-title">⏱️ Focus Timer</h2>

      <div class="timer-display" aria-live="polite" aria-atomic="true">
        <span id="timer-minutes">25</span>:<span id="timer-seconds">00</span>
      </div>

      <div class="timer-controls">
        <button id="btn-timer-start" class="btn btn-primary">Start</button>
        <button id="btn-timer-stop"  class="btn btn-secondary" disabled>Stop</button>
        <button id="btn-timer-reset" class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <!-- ----------------------------------------------------------
         COLUMN 2 — To-Do List
    ---------------------------------------------------------- -->
    <section class="card" id="todo-section" aria-labelledby="todo-heading">
      <h2 id="todo-heading" class="card-title">📝 To-Do List</h2>

      <form id="form-add-task" class="input-row" novalidate>
        <label for="input-task" class="sr-only">New task</label>
        <input
          type="text"
          id="input-task"
          class="input-text"
          placeholder="Add a new task…"
          autocomplete="off"
          maxlength="200"
          required
        />
        <button type="submit" class="btn btn-primary">Add</button>
      </form>

      <p id="todo-duplicate-msg" class="error-msg" role="alert" hidden>
        ⚠️ This task already exists.
      </p>

      <ul id="todo-list" class="task-list" aria-label="Task list"></ul>

      <p id="todo-empty-msg" class="empty-msg">No tasks yet. Add one above!</p>
    </section>

    <!-- ----------------------------------------------------------
         COLUMN 3 — Quick Links
    ---------------------------------------------------------- -->
    <section class="card" id="links-section" aria-labelledby="links-heading">
      <h2 id="links-heading" class="card-title">🔗 Quick Links</h2>

      <form id="form-add-link" class="input-row" novalidate>
        <label for="input-link-label" class="sr-only">Link label</label>
        <input
          type="text"
          id="input-link-label"
          class="input-text"
          placeholder="Label (e.g. GitHub)"
          autocomplete="off"
          maxlength="100"
          required
        />
        <label for="input-link-url" class="sr-only">URL</label>
        <input
          type="url"
          id="input-link-url"
          class="input-text"
          placeholder="https://…"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn btn-primary">Add</button>
      </form>

      <ul id="links-list" class="links-list" aria-label="Quick links list"></ul>

      <p id="links-empty-msg" class="empty-msg">No links yet. Add one above!</p>
    </section>

  </main>

  <!-- ============================================================
       MODAL — Set Custom Name
  ============================================================ -->
  <div id="modal-name" class="modal-overlay" role="dialog" aria-modal="true"
       aria-labelledby="modal-name-title" hidden>
    <div class="modal-box">
      <h2 id="modal-name-title" class="modal-title">What's your name?</h2>
      <form id="form-set-name" novalidate>
        <label for="input-name" class="sr-only">Your name</label>
        <input
          type="text"
          id="input-name"
          class="input-text"
          placeholder="Enter your name…"
          maxlength="50"
          required
        />
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" id="btn-modal-close" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast container for notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="js/script.js"></script>
</body>
</html>
